<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1b33"/>
      <stop offset="0.5" stop-color="#102744"/>
      <stop offset="1" stop-color="#0b1d36"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#c4a253" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#c4a253" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1f3a"/>
      <stop offset="1" stop-color="#060f1f"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2c46"/>
      <stop offset="0.5" stop-color="#0d1b30"/>
      <stop offset="1" stop-color="#05070d"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <!-- distant skyline -->
  <g fill="#0a1830" opacity="0.85">
    <rect x="60"  y="430" width="64"  height="230"/>
    <rect x="150" y="380" width="50"  height="280"/>
    <rect x="220" y="460" width="74"  height="200"/>
    <rect x="316" y="340" width="56"  height="320"/>
    <rect x="388" y="420" width="84"  height="240"/>
    <rect x="1470" y="400" width="64" height="260"/>
    <rect x="1552" y="350" width="54" height="310"/>
    <rect x="1624" y="450" width="80" height="210"/>
    <rect x="1720" y="390" width="52" height="270"/>
  </g>
  <g fill="#c4a253" opacity="0.55">
    <rect x="330" y="360" width="5" height="7"/><rect x="348" y="392" width="5" height="7"/>
    <rect x="170" y="410" width="5" height="7"/><rect x="1566" y="378" width="5" height="7"/>
    <rect x="1736" y="412" width="5" height="7"/><rect x="80" y="470" width="5" height="7"/>
    <rect x="404" y="448" width="5" height="7"/><rect x="1644" y="478" width="5" height="7"/>
  </g>

  <!-- ground -->
  <rect x="0" y="730" width="1920" height="350" fill="url(#ground)"/>
  <ellipse cx="1100" cy="980" rx="900" ry="120" fill="#c4a253" opacity="0.05"/>

  <!-- executive sedan, three-quarter cinematic -->
  <g transform="translate(720,556)">
    <ellipse cx="420" cy="384" rx="470" ry="34" fill="#000" opacity="0.45"/>
    <!-- body -->
    <path d="M10 258
             C6 220 34 200 98 194
             C156 150 262 128 420 126
             C588 124 716 148 782 196
             C850 200 902 220 918 256
             L922 326
             C922 342 909 352 892 352
             L36 352
             C19 352 6 342 6 326 Z" fill="url(#body)"/>
    <!-- roofline -->
    <path d="M214 192
             C266 150 338 132 444 132
             C570 132 660 156 720 198
             C731 205 726 214 713 214
             L238 214
             C221 214 206 203 214 192 Z" fill="#0a1525"/>
    <!-- windows with subtle gold reflection -->
    <path d="M262 200 C306 168 370 156 444 156 C432 156 382 158 338 204 Z" fill="#27405f" opacity="0.85"/>
    <path d="M466 156 C560 158 636 178 686 204 L486 204 Z" fill="#27405f" opacity="0.85"/>
    <!-- chrome belt -->
    <rect x="40" y="252" width="884" height="3" rx="1.5" fill="#c4a253" opacity="0.6"/>
    <!-- door seam -->
    <line x1="452" y1="218" x2="452" y2="344" stroke="#000" stroke-width="2" opacity="0.35"/>
    <!-- headlight -->
    <ellipse cx="900" cy="288" rx="22" ry="12" fill="#fdf0c8"/>
  </g>

  <!-- wheels -->
  <circle cx="858" cy="900" r="60" fill="#03070e"/>
  <circle cx="858" cy="900" r="27" fill="#1a2c46"/>
  <circle cx="858" cy="900" r="11" fill="#c4a253" opacity="0.7"/>
  <circle cx="1402" cy="900" r="60" fill="#03070e"/>
  <circle cx="1402" cy="900" r="27" fill="#1a2c46"/>
  <circle cx="1402" cy="900" r="11" fill="#c4a253" opacity="0.7"/>

  <!-- headlight beam -->
  <path d="M1630 836 L1920 800 L1920 900 L1640 884 Z" fill="#fdf0c8" opacity="0.10"/>
</svg>
