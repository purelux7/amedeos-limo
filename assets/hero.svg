<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fd0f5"/>
      <stop offset="0.55" stop-color="#cdeafb"/>
      <stop offset="1" stop-color="#fbf6ea"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.78" cy="0.2" r="0.5">
      <stop offset="0" stop-color="#fff6da" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#fff6da" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfc6b6"/>
      <stop offset="1" stop-color="#a89c87"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#sun)"/>
  <!-- distant skyline, light -->
  <g fill="#bcd6e6" opacity="0.7">
    <rect x="80"  y="470" width="70"  height="180"/>
    <rect x="170" y="430" width="55"  height="220"/>
    <rect x="245" y="500" width="80"  height="150"/>
    <rect x="345" y="400" width="60"  height="250"/>
    <rect x="420" y="470" width="90"  height="180"/>
    <rect x="1450" y="450" width="70" height="200"/>
    <rect x="1535" y="410" width="60" height="240"/>
    <rect x="1610" y="490" width="85" height="160"/>
    <rect x="1710" y="440" width="55" height="210"/>
  </g>
  <!-- palm trees -->
  <g stroke="#6a8f4e" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M1330 720 C1335 600 1345 520 1352 470"/>
  </g>
  <g fill="#5f8a45" opacity="0.92">
    <path d="M1352 470 C1290 440 1235 452 1205 486 C1258 472 1310 482 1352 504 Z"/>
    <path d="M1352 470 C1414 440 1469 452 1499 486 C1446 472 1394 482 1352 504 Z"/>
    <path d="M1352 470 C1326 415 1331 360 1357 330 C1350 384 1356 438 1366 492 Z"/>
  </g>
  <!-- green roadside -->
  <path d="M0 720 L1920 690 L1920 770 L0 800 Z" fill="#9bbf6e" opacity="0.55"/>
  <!-- road -->
  <path d="M0 800 L1920 770 L1920 1080 L0 1080 Z" fill="url(#road)"/>
  <g stroke="#f4e3a8" stroke-width="8" opacity="0.7" stroke-dasharray="40 46">
    <line x1="60" y1="940" x2="1880" y2="900"/>
  </g>
  <!-- silver sedan -->
  <g transform="translate(640,560)">
    <path d="M40 150 C60 88 140 68 300 66 C420 64 520 88 560 108 C600 93 660 94 680 110 C722 114 762 128 772 160 L772 200 L20 200 L20 165 Z" fill="#e9edf1"/>
    <path d="M180 76 C220 48 480 48 520 78 L560 108 L150 110 Z" fill="#bcd2e2"/>
    <path d="M40 150 C60 120 740 120 772 160 L772 200 L20 200 Z" fill="#cdd6de"/>
    <rect x="20" y="188" width="752" height="14" rx="6" fill="#9aa4ad"/>
  </g>
  <ellipse cx="760" cy="765" rx="50" ry="48" fill="#2b2b30"/>
  <ellipse cx="1240" cy="755" rx="52" ry="50" fill="#2b2b30"/>
  <circle cx="760" cy="765" r="22" fill="#c7ccd2"/>
  <circle cx="1240" cy="755" r="22" fill="#c7ccd2"/>
  <!-- warm headlight -->
  <circle cx="1300" cy="690" r="14" fill="#fff4cf"/>
