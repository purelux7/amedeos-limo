<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9cdb6"/>
      <stop offset="0.45" stop-color="#e7ddca"/>
      <stop offset="0.78" stop-color="#efe7d7"/>
      <stop offset="1" stop-color="#f4efe4"/>
    </linearGradient>
    <radialGradient id="haze" cx="0.66" cy="0.34" r="0.55">
      <stop offset="0" stop-color="#fbf3df" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#fbf3df" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfc6b4"/>
      <stop offset="1" stop-color="#bdb4a1"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b3a37"/>
      <stop offset="0.5" stop-color="#26241f"/>
      <stop offset="1" stop-color="#16140f"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6f6c63"/>
      <stop offset="1" stop-color="#4a473f"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#haze)"/>

  <!-- faint horizon treeline, very soft -->
  <rect x="0" y="690" width="1920" height="60" fill="#cdc4b0" opacity="0.45"/>
  <!-- ground plane -->
  <rect x="0" y="744" width="1920" height="336" fill="url(#ground)"/>
  <!-- soft reflection sheen on ground -->
  <ellipse cx="960" cy="930" rx="780" ry="120" fill="#000" opacity="0.06"/>

  <!-- elegant executive sedan silhouette -->
  <g transform="translate(560,556)">
    <!-- shadow -->
    <ellipse cx="400" cy="372" rx="430" ry="34" fill="#000" opacity="0.18"/>
    <!-- lower body -->
    <path d="M14 250
             C10 214 36 196 96 190
             C150 152 250 132 400 130
             C560 128 680 150 742 196
             C806 200 856 218 872 250
             L876 318
             C876 332 864 342 848 342
             L40 342
             C24 342 12 332 12 318 Z" fill="url(#body)"/>
    <!-- greenhouse / roofline -->
    <path d="M214 188
             C262 150 330 134 430 134
             C548 134 632 156 690 196
             C700 202 696 210 684 210
             L236 210
             C220 210 206 200 214 188 Z" fill="#1b1a16"/>
    <!-- windows -->
    <path d="M258 196 C300 166 360 154 430 154 C420 154 372 156 330 200 Z" fill="url(#glass)" opacity="0.9"/>
    <path d="M452 154 C540 156 612 174 660 200 L470 200 Z" fill="url(#glass)" opacity="0.9"/>
    <!-- belt-line chrome accent -->
    <rect x="40" y="246" width="824" height="3" rx="1.5" fill="#b9a06a" opacity="0.55"/>
    <!-- door seam -->
    <line x1="438" y1="214" x2="438" y2="334" stroke="#000" stroke-width="2" opacity="0.25"/>
  </g>

  <!-- wheels -->
  <circle cx="688" cy="900" r="58" fill="#14130f"/>
  <circle cx="688" cy="900" r="26" fill="#3a3833"/>
  <circle cx="688" cy="900" r="11" fill="#b9a06a" opacity="0.7"/>
  <circle cx="1218" cy="900" r="58" fill="#14130f"/>
  <circle cx="1218" cy="900" r="26" fill="#3a3833"/>
  <circle cx="1218" cy="900" r="11" fill="#b9a06a" opacity="0.7"/>

  <!-- warm headlight glow -->
  <circle cx="1300" cy="804" r="10" fill="#fff3d2"/>
  <ellipse cx="1340" cy="806" rx="120" ry="22" fill="#fbeebf" opacity="0.28"/>
</svg>
