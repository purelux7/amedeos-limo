<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="900" viewBox="0 0 1920 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ctaSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ded2bb"/>
      <stop offset="0.6" stop-color="#ece3d2"/>
      <stop offset="1" stop-color="#f4efe4"/>
    </linearGradient>
    <radialGradient id="ctaHaze" cx="0.5" cy="0.28" r="0.6">
      <stop offset="0" stop-color="#fbf3df" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#fbf3df" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ctaRoad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9c0ad"/>
      <stop offset="1" stop-color="#b3aa97"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="900" fill="url(#ctaSky)"/>
  <rect width="1920" height="900" fill="url(#ctaHaze)"/>
  <!-- distant soft treeline -->
  <rect x="0" y="556" width="1920" height="40" fill="#cbc2ae" opacity="0.5"/>
  <!-- ground -->
  <rect x="0" y="592" width="1920" height="308" fill="#c3baa6"/>
  <!-- road perspective -->
  <path d="M860 592 L1060 592 L1320 900 L600 900 Z" fill="url(#ctaRoad)"/>
  <path d="M958 592 L962 592 L975 900 L945 900 Z" fill="#e7dcc4" opacity="0.6"/>
</svg>
